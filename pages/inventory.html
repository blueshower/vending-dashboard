<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>庫存預訂 — 販賣機管理</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>
<script>
window.addEventListener("DOMContentLoaded", async () => {
  renderLayout("庫存預訂資訊", "inventory");
  document.getElementById("page-body").innerHTML = `<p style="padding:16px;color:#64748b">載入中…</p>`;
  await loadInventory();
});

async function loadInventory() {
  showLoading(true);
  try {
    const { company, devices: allowed } = getSession();
    const begin = getMonthStart(), end = getToday();

    // 同時呼叫設備狀態 + 設備名稱
    const [stateRes, nameRes] = await Promise.all([
      callAPI("/MachineState.aspx", { company }),
      callAPI("/Machine.aspx", { company }),
    ]);

    // code → name 對照表
    const nameMap = {};
    (nameRes.machine || []).forEach(m => { nameMap[m.code] = m.name; });

    let machines = stateRes.machine || [];
    if (allowed && allowed.length > 0) {
      machines = machines.filter(m => allowed.includes(m.code));
    }
    const codeList = machines.map(m => m.code);

    // 逐台取即時庫存 + 可售庫存
    const invData = {};
    await Promise.all(codeList.map(async code => {
      const [rtRes, slRes] = await Promise.allSettled([
        callAPI("/MachineCommodity.aspx", { code, company }),
        callAPI("/OrderMachineCommodity.aspx", { code, company }),
      ]);
      invData[code] = {
        realtime: rtRes.status==="fulfilled" ? (rtRes.value.commodity||[]) : [],
        sellable:  slRes.status==="fulfilled" ? (slRes.value.commodity||[]) : [],
      };
    }));

    // 預訂資料
    const orderRes = await callAPI("/OrderList.aspx", { begin, company, end, future:1 });
    const orders = orderRes.order || [];

    const rows = [];
    let idx = 1;
    codeList.forEach(code => {
      const { realtime, sellable } = invData[code];
      const devName = nameMap[code] || "—";

      const rtMap = {};
      realtime.forEach(item => {
        if (!rtMap[item.commodityCode]) rtMap[item.commodityCode] = { name: item.name, count: 0 };
        rtMap[item.commodityCode].count++;
      });
      const slMap = {};
      sellable.forEach(item => { slMap[item.commodityCode] = item.quantity; });
      const devName4Order = nameMap[code] || "";
      const ordMap = {};
      orders.filter(o => o.finish === "False" && o.name === devName4Order).forEach(o => {
        ordMap[o.commodityCode] = (ordMap[o.commodityCode] || 0) + 1;
      });

      const allCodes = new Set([...Object.keys(rtMap), ...Object.keys(slMap)]);
      allCodes.forEach(cc => {
        const name  = rtMap[cc]?.name || sellable.find(s => s.commodityCode === cc)?.commodityName || cc;
        const rt    = rtMap[cc]?.count ?? "—";
        const sl    = slMap[cc] ?? 0;
        const ord   = ordMap[cc] || 0;
        const badge = sl >= 1
          ? `<span class="badge badge-green">有貨</span>`
          : `<span class="badge badge-red">缺貨</span>`;

        rows.push(`<tr>
          <td>${idx++}</td>
          <td><code style="font-size:11px">${code}</code></td>
          <td><strong>${devName}</strong></td>
          <td>${cc}</td>
          <td>${name}</td>
          <td>${rt}</td>
          <td>${sl}</td>
          <td>${ord}</td>
          <td>${badge}</td>
        </tr>`);
      });
    });

    document.getElementById("page-body").innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <h2>庫存預訂列表（${rows.length} 筆商品）</h2>
          <button class="btn-icon" onclick="loadInventory()">🔄 重新整理</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>#</th><th>設備編號</th><th>設備名稱</th><th>商品編號</th>
              <th>商品名稱</th><th>即時庫存</th><th>可售庫存</th><th>預訂數量</th><th>狀態</th>
            </tr>
          </thead>
          <tbody>${rows.join("") || "<tr><td colspan='9' style='text-align:center;color:#64748b'>無資料</td></tr>"}</tbody>
        </table>
      </div>`;
  } catch(e) {
    document.getElementById("page-body").innerHTML = `<p style="color:red;padding:24px">載入失敗：${e.message}</p>`;
  } finally { showLoading(false); }
}
</script>
</body>
</html>
