<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — 販賣機管理</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .chart-canvas-wrap {
      position: relative; height: 240px; width: 100%;
    }
    .chart-canvas-wrap canvas {
      position: absolute; top:0; left:0;
      width:100%!important; height:100%!important;
    }
    .chart-canvas-wrap.heatmap-wrap { overflow-x:auto; overflow-y:auto; }
    .heatmap-table { border-collapse:collapse; height:100%; table-layout:fixed; }
    .heatmap-table th, .heatmap-table td {
      min-width:22px; width:22px; height:26px; font-size:10px;
      text-align:center; padding:0; white-space:nowrap;
    }
    .heatmap-table th {
      font-weight:600; background:transparent; color:inherit;
      position:sticky; left:0; z-index:1;
    }
    .heatmap-table tr th:first-child { min-width:32px; width:32px; }

    /* ── 快取狀態列 ── */
    .cache-bar {
      display:flex; align-items:center; gap:10px; padding:8px 16px;
      background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px;
      margin-bottom:14px; font-size:12px; color:#166534; flex-wrap:wrap;
    }
    .cache-bar .cache-time { font-weight:600; }
    .cache-bar .btn-refresh {
      margin-left:auto; background:#16a34a; color:#fff; border:none;
      border-radius:6px; padding:5px 14px; font-size:12px;
      cursor:pointer; font-weight:600; transition:background .15s;
    }
    .cache-bar .btn-refresh:hover { background:#15803d; }
    .cache-bar .btn-refresh:disabled { background:#86efac; cursor:not-allowed; }

    /* ── 載入進度面板 ── */
    #load-panel {
      background:#fff; border:1px solid #e2e8f0; border-radius:12px;
      padding:28px 32px; max-width:580px; margin:32px auto;
      box-shadow:0 4px 24px rgba(0,0,0,.07);
    }
    #load-panel h3 {
      margin:0 0 20px; font-size:16px; color:#1e293b;
      display:flex; align-items:center; gap:8px;
    }
    .load-step {
      display:flex; align-items:center; gap:10px; padding:7px 0;
      font-size:13px; color:#64748b;
      border-bottom:1px solid #f1f5f9; transition:color .2s;
    }
    .load-step:last-child { border-bottom:none; }
    .load-step .step-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
    .load-step .step-label { flex:1; }
    .load-step .step-status {
      font-size:11px; font-weight:600; padding:2px 8px;
      border-radius:99px; background:#f1f5f9; color:#94a3b8; white-space:nowrap;
    }
    .load-step.running { color:#1e40af; }
    .load-step.running .step-status { background:#dbeafe; color:#1d4ed8; }
    .load-step.done    { color:#166534; }
    .load-step.done .step-status    { background:#dcfce7; color:#16a34a; }
    .load-step.error   { color:#991b1b; }
    .load-step.error .step-status   { background:#fee2e2; color:#dc2626; }
    .load-step.partial { color:#92400e; }
    .load-step.partial .step-status { background:#fef3c7; color:#d97706; }

    /* 整體進度條 */
    .overall-progress { margin-top:20px; }
    .overall-progress .prog-header {
      display:flex; justify-content:space-between;
      font-size:12px; color:#64748b; margin-bottom:6px;
    }
    .prog-track {
      background:#f1f5f9; border-radius:99px; height:8px; overflow:hidden;
    }
    .prog-fill {
      height:100%;
      background:linear-gradient(90deg,#2563eb,#16a34a);
      border-radius:99px; transition:width .4s ease; width:0%;
    }

    /* 分批小狀態格 */
    .batch-grid { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
    .batch-chip {
      font-size:10px; padding:2px 7px; border-radius:99px;
      background:#f1f5f9; color:#94a3b8; border:1px solid #e2e8f0;
      transition:all .2s;
    }
    .batch-chip.running { background:#dbeafe; color:#1d4ed8; border-color:#93c5fd; }
    .batch-chip.done    { background:#dcfce7; color:#16a34a; border-color:#86efac; }
    .batch-chip.error   { background:#fee2e2; color:#dc2626; border-color:#fca5a5; }

    /* Toast */
    .sync-toast {
      position:fixed; bottom:24px; right:24px;
      background:#1e293b; color:#fff; padding:10px 18px;
      border-radius:8px; font-size:13px; z-index:9999;
      opacity:0; transform:translateY(8px);
      transition:opacity .3s, transform .3s; pointer-events:none;
    }
    .sync-toast.show { opacity:1; transform:translateY(0); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>
<script>
// ============================================================
// 全域狀態
// ============================================================
let G = { devices:[], stateMap:{}, inventoryMap:{}, orders:[], sales:[], updatedAt:null };
let charts = {};

// ── 可調整參數 ──
const SALES_BATCH_DAYS  = 5;   // 每批幾天
const SALES_CONCURRENCY = 4;   // 同時最多幾批

// ============================================================
// 進度管理器
// ============================================================
const Progress = (() => {
  const steps = {};
  let _total = 0, _done = 0;

  function register(id, icon, label) {
    steps[id] = { icon, label, status:"pending", detail:"" };
    _render();
  }
  function set(id, status, detail="") {
    if (!steps[id]) return;
    const prev = steps[id].status;
    steps[id].status = status;
    steps[id].detail = detail;
    // 只在首次進入終態時計數
    const terminal = ["done","error","partial"];
    if (terminal.includes(status) && !terminal.includes(prev)) {
      _done++;
      _updateBar();
    }
    _render();
  }
  function setTotal(n) { _total = n; _done = 0; }

  function _updateBar() {
    const pct = _total > 0 ? Math.round(_done / _total * 100) : 0;
    const fill  = document.getElementById("prog-fill");
    const label = document.getElementById("prog-pct");
    if (fill)  fill.style.width = pct + "%";
    if (label) label.textContent = pct + "%";
  }
  function _render() {
    const container = document.getElementById("load-steps");
    if (!container) return;
    const statusText = { pending:"等待中", running:"載入中…", done:"完成", error:"失敗", partial:"部分成功" };
    container.innerHTML = Object.entries(steps).map(([id, s]) => `
      <div class="load-step ${s.status}">
        <span class="step-icon">${s.icon}</span>
        <span class="step-label">${s.label}
          ${s.detail ? `<span style="font-size:11px;color:#94a3b8;margin-left:6px">${s.detail}</span>` : ""}
        </span>
        <span class="step-status">${statusText[s.status] || s.status}</span>
      </div>`).join("");
  }
  function renderBatchChips(n) {
    const el = document.getElementById("batch-chips");
    if (!el) return;
    el.innerHTML = Array.from({length:n}, (_,i) =>
      `<span class="batch-chip" id="chip-${i}">${i*SALES_BATCH_DAYS+1}~${(i+1)*SALES_BATCH_DAYS}日</span>`
    ).join("");
  }
  function setChip(idx, status) {
    const el = document.getElementById(`chip-${idx}`);
    if (el) el.className = "batch-chip " + status;
  }
  return { register, set, setTotal, renderBatchChips, setChip };
})();

// ============================================================
// 日期工具
// ============================================================
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

/**
 * 將 [beginStr, endStr] 拆成每 batchDays 天一段
 */
function splitDateRanges(beginStr, endStr, batchDays) {
  const ranges = [];
  let cur  = new Date(beginStr + "T00:00:00");
  const last = new Date(endStr + "T00:00:00");
  while (cur <= last) {
    const segEnd = new Date(cur);
    segEnd.setDate(segEnd.getDate() + batchDays - 1);
    if (segEnd > last) segEnd.setTime(last.getTime());
    ranges.push({ begin: formatDate(cur), end: formatDate(segEnd) });
    cur = new Date(segEnd);
    cur.setDate(cur.getDate() + 1);
  }
  return ranges;
}

/**
 * 限流並行器：最多 concurrency 個 task 同時執行
 */
async function runWithConcurrency(tasks, concurrency) {
  const results = new Array(tasks.length);
  let idx = 0;
  async function worker() {
    while (idx < tasks.length) {
      const i = idx++;
      try      { results[i] = await tasks[i](); }
      catch(e) { results[i] = { _error: e.message }; }
    }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, tasks.length) }, worker));
  return results;
}

// ============================================================
// DOMContentLoaded
// ============================================================
window.addEventListener("DOMContentLoaded", async () => {
  renderLayout("Dashboard", "dashboard");
  showLoadPanel();
  await loadAll();
});

function getAuthorizedDevices(allCodes) {
  const allowed = getSession().devices;
  if (!allowed || allowed.length === 0) return allCodes;
  return allCodes.filter(c => allowed.includes(c));
}

function showLoadPanel() {
  document.getElementById("page-body").innerHTML = `
    <div id="load-panel">
      <h3>⚡ 資料載入中</h3>
      <div id="load-steps"></div>
      <div class="overall-progress">
        <div class="prog-header"><span>整體進度</span><span id="prog-pct">0%</span></div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      </div>
    </div>`;
}

// ============================================================
// 主載入流程
// ============================================================
async function loadAll() {
  // 共 5 個主步驟
  Progress.setTotal(5);
  Progress.register("machine",   "🖥️", "設備狀態");
  Progress.register("name",      "🏷️", "設備名稱");
  Progress.register("inventory", "📦", "庫存資料");
  Progress.register("orders",    "📋", "預訂資料");
  Progress.register("sales",     "💳", "銷售資料（分批並行）");

  try {
    const { company } = getSession();
    const begin = getMonthStart(), end = getToday();

    // ── Step 1 & 2：設備狀態 + 設備名稱（並行）──
    Progress.set("machine", "running");
    Progress.set("name",    "running");

    const [stateRes, nameRes] = await Promise.all([
      callAPI("/MachineState.aspx", { company }),
      callAPI("/Machine.aspx",      { company }),
    ]);

    const allCodes = stateRes.machine.map(m => m.code);
    G.devices = getAuthorizedDevices(allCodes);
    stateRes.machine.forEach(m => G.stateMap[m.code] = m);
    Progress.set("machine", "done", `${G.devices.length} 台`);

    const nameMap = {};
    (nameRes.machine || []).forEach(m => { nameMap[m.code] = m.name; });
    Progress.set("name", "done", `${nameRes.machine?.length || 0} 筆`);

    // ── Step 3：庫存（各設備全部並行）──
    Progress.set("inventory", "running", `0 / ${G.devices.length}`);
    let invDone = 0;

    await Promise.all(G.devices.map(async code => {
      try {
        const [rtRes, slRes] = await Promise.allSettled([
          callAPI("/MachineCommodity.aspx",      { code, company }),
          callAPI("/OrderMachineCommodity.aspx", { code, company }),
        ]);
        G.inventoryMap[code] = {
          name:     nameMap[code] || code,
          realtime: rtRes.status==="fulfilled" ? (rtRes.value.commodity||[]) : [],
          sellable: slRes.status==="fulfilled" ? (slRes.value.commodity||[]) : [],
        };
      } catch {
        G.inventoryMap[code] = { name: nameMap[code]||code, realtime:[], sellable:[] };
      }
      invDone++;
      Progress.set("inventory", "running", `${invDone} / ${G.devices.length}`);
    }));
    Progress.set("inventory", "done", `${G.devices.length} 台`);

    // ── Step 4 & 5：預訂 + 銷售分批，兩者並行啟動 ──
    Progress.set("orders", "running");
    Progress.set("sales",  "running", "切割日期區間…");

    const ranges = splitDateRanges(begin, end, SALES_BATCH_DAYS);
    Progress.renderBatchChips(ranges.length);
    Progress.set("sales", "running",
      `共 ${ranges.length} 批 × ${SALES_BATCH_DAYS} 天，並行 ${SALES_CONCURRENCY} 個`);

    // 建立 sales 分批 tasks
    const salesResults = new Array(ranges.length).fill(null);
    let batchDone = 0, batchErr = 0;

    const batchTasks = ranges.map((range, i) => async () => {
      Progress.setChip(i, "running");
      try {
        const res = await callAPI("/Sales.aspx", { begin: range.begin, company, end: range.end });
        salesResults[i] = res.sales || [];
        batchDone++;
        Progress.setChip(i, "done");
      } catch(e) {
        salesResults[i] = [];
        batchErr++;
        Progress.setChip(i, "error");
        console.warn(`[Sales batch ${i}] ${range.begin}~${range.end}:`, e.message);
      }
      Progress.set("sales", "running",
        `${batchDone + batchErr} / ${ranges.length} 完成${batchErr > 0 ? `（${batchErr} 失敗）` : ""}`);
    });

    // 預訂 & 銷售分批同時跑
    const [orderRes] = await Promise.all([
      callAPI("/OrderList.aspx", { begin, company, end, future:1 })
        .then(r  => { Progress.set("orders", "done", `${r.order?.length||0} 筆`); return r; })
        .catch(e => { Progress.set("orders", "error", e.message); return { order:[] }; }),
      runWithConcurrency(batchTasks, SALES_CONCURRENCY),
    ]);

    G.orders = orderRes.order || [];

    // 合併去重（透過 orderId 或複合鍵）
    const seen = new Set();
    const merged = salesResults.flat().filter(s => {
      const key = s.orderId || `${s.time}__${s.code}__${s.commodityName}__${s.price}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    const hasFilter = Array.isArray(G.devices) && G.devices.length > 0;
    G.sales = hasFilter ? merged.filter(s => G.devices.includes(s.code)) : merged;

    Progress.set("sales", batchErr > 0 ? "partial" : "done",
      `${G.sales.length} 筆${batchErr > 0 ? `（${batchErr} 批失敗）` : ""}`);

    G.updatedAt = new Date().toISOString();

    // 短暫停頓讓使用者看見 100%，再切換畫面
    await new Promise(r => setTimeout(r, 350));
    renderDashboard();
    syncToSheet(); // 非阻塞

  } catch(e) {
    document.getElementById("page-body").innerHTML =
      `<p style="color:red;padding:24px;">資料載入失敗：${e.message}</p>`;
    console.error(e);
  }
}

// ============================================================
// 寫回 Google Sheet（背景非阻塞）
// ============================================================
async function syncToSheet() {
  showSyncToast("☁️ 正在同步資料到 Google Sheet…");
  try {
    const { company } = getSession();
    const now = new Date();

    // 設備快取
    const devicesPayload = G.devices.map(code => {
      const m = G.stateMap[code] || {};
      const inv = G.inventoryMap[code] || {};
      return {
        code, name: inv.name||"—",
        online: (now - new Date(m.uploadTime))/60000 <= 5,
        uploadTime: m.uploadTime||"", temperature1: m.temperature1??"",
      };
    });
    await writeCacheToSheet("cache_devices", { company, updatedAt:G.updatedAt, devices:devicesPayload });

    // 庫存快取
    const inventoryPayload = [];
    G.devices.forEach(code => {
      const { name, realtime, sellable } = G.inventoryMap[code] || {};
      const rtMap = {};
      (realtime||[]).forEach(item => {
        if (!rtMap[item.commodityCode]) rtMap[item.commodityCode] = { name:item.name, count:0 };
        rtMap[item.commodityCode].count++;
      });
      const slMap = {};
      (sellable||[]).forEach(item => { slMap[item.commodityCode] = item.quantity; });
      [...new Set([...Object.keys(rtMap), ...Object.keys(slMap)])].forEach(cc => {
        inventoryPayload.push({
          code, devName:name||"—", commodityCode:cc,
          commodityName: rtMap[cc]?.name || (sellable||[]).find(s=>s.commodityCode===cc)?.commodityName||cc,
          realtime: rtMap[cc]?.count??"", sellable: slMap[cc]??0,
        });
      });
    });
    await writeCacheToSheet("cache_inventory", { company, updatedAt:G.updatedAt, inventory:inventoryPayload, orders:G.orders });

    // 銷售快取
    await writeCacheToSheet("cache_sales_month", { company, updatedAt:G.updatedAt, sales:G.sales });
    const todaySales = G.sales.filter(s => s.time?.startsWith(getToday()));
    await writeCacheToSheet("cache_sales_today", { company, updatedAt:G.updatedAt, sales:todaySales });

    showSyncToast("✅ 同步完成！其他頁面可直接讀取快取");
  } catch(e) {
    showSyncToast("⚠️ 部分同步失敗，請檢查 GAS");
    console.error("[syncToSheet]", e);
  }
}

// ============================================================
// Toast
// ============================================================
let _toastTimer = null;
function showSyncToast(msg, ms=3500) {
  let el = document.getElementById("sync-toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "sync-toast"; el.className = "sync-toast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add("show");
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove("show"), ms);
}

// ============================================================
// 重整
// ============================================================
async function reloadDashboard() {
  G = { devices:[], stateMap:{}, inventoryMap:{}, orders:[], sales:[], updatedAt:null };
  Object.values(charts).forEach(c => c?.destroy?.());
  charts = {};
  showLoadPanel();
  await loadAll();
}

function getDayCount(b, e) {
  return Math.ceil((new Date(e) - new Date(b)) / 86400000) + 1;
}

// ============================================================
// 渲染 Dashboard
// ============================================================
function renderDashboard() {
  const now = new Date(), today = getToday();
  let online=0, offline=0;
  G.devices.forEach(code => {
    const m = G.stateMap[code];
    (!m || (now - new Date(m.uploadTime))/60000 > 5) ? offline++ : online++;
  });

  let invFull=0, invNormal=0, invLow=0, invShort=0;
  G.devices.forEach(code => {
    const inv = G.inventoryMap[code]?.sellable || [];
    const total = inv.length;
    if (!total) { invShort++; return; }
    const pct = inv.filter(i => i.quantity >= 1).length / total;
    if      (pct >= 0.8)  invFull++;
    else if (pct >= 0.5)  invNormal++;
    else if (pct >= 0.25) invLow++;
    else                  invShort++;
  });

  const monthSales = G.sales.filter(s => s.state === 1);
  const monthAmt   = monthSales.reduce((a,s) => a+(s.price||0), 0);
  const todaySales = monthSales.filter(s => s.time?.startsWith(today));
  const todayAmt   = todaySales.reduce((a,s) => a+(s.price||0), 0);
  const updatedLabel = G.updatedAt
    ? new Date(G.updatedAt).toLocaleString("zh-TW",{hour12:false}) : "—";
  const batchCount = splitDateRanges(getMonthStart(), getToday(), SALES_BATCH_DAYS).length;

  document.getElementById("page-body").innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" onclick="location.href='device.html'">
        <div class="icon">🖥️</div><div class="label">設備狀態</div>
        <div class="value">${G.devices.length}</div>
        <div class="sub-label">連線 ${online} ／ 離線 ${offline}</div>
      </div>
      <div class="stat-card" onclick="location.href='inventory.html'">
        <div class="icon">📦</div><div class="label">庫存狀態</div>
        <div class="value">${G.devices.length}</div>
        <div class="sub-label">充足${invFull} 正常${invNormal} 稍低${invLow} 不足${invShort}</div>
      </div>
      <div class="stat-card" onclick="location.href='transaction_month.html'">
        <div class="icon">💳</div><div class="label">本月交易</div>
        <div class="value">${monthSales.length}</div>
        <div class="sub-label">NT$ ${monthAmt.toLocaleString()}</div>
      </div>
      <div class="stat-card" onclick="location.href='transaction_today.html'">
        <div class="icon">📅</div><div class="label">今日交易</div>
        <div class="value">${todaySales.length}</div>
        <div class="sub-label">NT$ ${todayAmt.toLocaleString()}</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="cache-bar" style="grid-column:1/-1">
        <span>📡 即時 API</span>
        <span class="cache-time">更新：${updatedLabel}</span>
        <span style="color:#64748b;font-size:11px">
          ${G.sales.length} 筆 ／ ${batchCount} 批 × ${SALES_BATCH_DAYS} 天並行載入
        </span>
        <button class="btn-refresh" onclick="reloadDashboard()">🔄 重新整理</button>
      </div>
      <div class="chart-col">
        <div class="chart-card"><h3>連線狀態</h3>
          <div class="chart-canvas-wrap"><canvas id="chart-conn"></canvas></div></div>
        <div class="chart-card"><h3>庫存狀態</h3>
          <div class="chart-canvas-wrap"><canvas id="chart-inv"></canvas></div></div>
      </div>
      <div class="chart-col">
        <div class="chart-card"><h3>各設備商品販售統計</h3>
          <div class="chart-canvas-wrap"><canvas id="chart-device-sales"></canvas></div></div>
        <div class="chart-card"><h3>商品銷售排名</h3>
          <div class="chart-canvas-wrap"><canvas id="chart-rank"></canvas></div></div>
      </div>
      <div class="chart-col">
        <div class="chart-card"><h3>每日交易趨勢</h3>
          <div class="chart-canvas-wrap"><canvas id="chart-trend"></canvas></div></div>
        <div class="chart-card"><h3>銷售熱力圖（週×時段）</h3>
          <div class="chart-canvas-wrap heatmap-wrap" id="heatmap-wrap"></div></div>
      </div>
    </div>`;

  drawConnectionPie(online, offline);
  drawInventoryPie(invFull, invNormal, invLow, invShort);
  drawDeviceSales(monthSales);
  drawRankBar(monthSales);
  drawTrend(monthSales);
  drawHeatmap(monthSales);
}

// ============================================================
// 圖表
// ============================================================
function drawConnectionPie(on, off) {
  charts.conn?.destroy();
  charts.conn = new Chart(document.getElementById("chart-conn"), {
    type:"doughnut",
    data:{ labels:["連線","離線"], datasets:[{data:[on,off],backgroundColor:["#16a34a","#dc2626"]}] },
    options:{ maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}, cutout:"60%" }
  });
}
function drawInventoryPie(f,n,l,s) {
  charts.inv?.destroy();
  charts.inv = new Chart(document.getElementById("chart-inv"), {
    type:"doughnut",
    data:{ labels:["充足","正常","稍低","不足"], datasets:[{data:[f,n,l,s],backgroundColor:["#16a34a","#2563eb","#d97706","#dc2626"]}] },
    options:{ maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}, cutout:"60%" }
  });
}
function drawDeviceSales(sales) {
  const map={}, productSet=new Set();
  sales.forEach(s => {
    const dev=s.name||s.code, prod=s.commodityName;
    if(!map[dev]) map[dev]={};
    map[dev][prod]=(map[dev][prod]||0)+1;
    productSet.add(prod);
  });
  const devices=Object.keys(map), products=[...productSet];
  const colors=["#2563eb","#16a34a","#d97706","#dc2626","#7c3aed","#0891b2","#be185d","#65a30d"];
  charts.deviceSales?.destroy();
  charts.deviceSales = new Chart(document.getElementById("chart-device-sales"), {
    type:"bar",
    data:{ labels:devices, datasets:products.map((p,i)=>({
      label:p, data:devices.map(d=>map[d][p]||0), backgroundColor:colors[i%colors.length]
    })) },
    options:{ maintainAspectRatio:false, plugins:{legend:{display:false}},
              scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}} }
  });
}
function drawRankBar(sales) {
  const map={};
  sales.forEach(s=>{ map[s.commodityName]=(map[s.commodityName]||0)+1; });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  charts.rank?.destroy();
  charts.rank = new Chart(document.getElementById("chart-rank"), {
    type:"bar",
    data:{ labels:sorted.map(x=>x[0]), datasets:[{label:"銷售數量",data:sorted.map(x=>x[1]),backgroundColor:"#2563eb"}] },
    options:{ maintainAspectRatio:false, indexAxis:"y", plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
  });
}
function drawTrend(sales) {
  const dayMap={}, amtMap={};
  sales.forEach(s => {
    const d=s.time?.slice(0,10); if(!d) return;
    dayMap[d]=(dayMap[d]||0)+1; amtMap[d]=(amtMap[d]||0)+(s.price||0);
  });
  const days=Object.keys(dayMap).sort();
  charts.trend?.destroy();
  charts.trend = new Chart(document.getElementById("chart-trend"), {
    type:"line",
    data:{ labels:days.map(d=>d.slice(5)), datasets:[
      { label:"筆數", data:days.map(d=>dayMap[d]), borderColor:"#2563eb", tension:0.4, yAxisID:"y1" },
      { label:"金額", data:days.map(d=>amtMap[d]), borderColor:"#16a34a", tension:0.4, yAxisID:"y2" }
    ] },
    options:{ maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}, scales:{
      y1:{position:"left",beginAtZero:true},
      y2:{position:"right",beginAtZero:true,grid:{drawOnChartArea:false}}
    }}
  });
}
function drawHeatmap(sales) {
  const days=["一","二","三","四","五","六","日"];
  const grid=Array.from({length:7},()=>Array(24).fill(0));
  sales.forEach(s => {
    if(!s.time) return;
    const d=new Date(s.time.replace(" ","T"));
    grid[(d.getDay()+6)%7][d.getHours()]++;
  });
  const max=Math.max(...grid.flat(),1);
  const col=v=>`rgba(37,99,235,${(v/max*0.85+0.05).toFixed(2)})`;
  const hours=Array.from({length:24},(_,i)=>i);
  let html=`<table class="heatmap-table" style="width:max-content;height:100%">
    <tr><th></th>${hours.map(h=>`<th>${h}</th>`).join("")}</tr>`;
  days.forEach((day,di) => {
    html+=`<tr><th>週${day}</th>`;
    hours.forEach(h => {
      const v=grid[di][h];
      html+=`<td style="background:${col(v)};color:${v>max*0.5?"#fff":"transparent"}"
               title="週${day} ${h}時：${v}筆">${v||""}</td>`;
    });
    html+="</tr>";
  });
  html+="</table>";
  document.getElementById("heatmap-wrap").innerHTML=html;
}
</script>
</body>
</html>
