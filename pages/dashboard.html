<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — 販賣機管理</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ══ 全域 border-box ── */
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      /* 桌機預設隱藏滾動，由 .page-body 控制 */
      overflow: hidden;
    }

    .main-content {
      height: 100vh;
      overflow: hidden;
    }

    /* topbar 固定 56px，page-body 佔剩餘全部 */
    .page-body {
      padding: 0;
      height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      overflow: hidden;   /* 桌機保持 hidden，由內部 grid 分割 */
    }

    /* ── 上段 20%：統計卡片 ── */
    #row-cards {
      height: 20%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px 14px 5px;
      overflow: hidden;
    }
    #row-cards .stat-card {
      margin: 0;
      padding: 10px 14px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    #row-cards .stat-card .label     { font-size: 11px; }
    #row-cards .stat-card .value     { font-size: 22px; margin: 2px 0 1px; }
    #row-cards .stat-card .sub-label { font-size: 11px; }
    #row-cards .stat-card .icon      { font-size: 20px; top: 10px; right: 12px; }

    /* ── 中段 40%：設備連線 | 設備銷售 | 每日趨勢 ── */
    #row-mid {
      height: 40%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 5px 14px;
      overflow: hidden;
    }

    /* ── 下段 40%：庫存 | 銷售排名 | 熱力圖 ── */
    #row-bot {
      height: 40%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 5px 14px 10px;
      overflow: hidden;
    }

    /* ── 共用圖表卡片 ── */
    .db-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .db-card h3 {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .3px;
      margin: 0 0 4px;
      flex-shrink: 0;
    }
    .db-card canvas {
      flex: 1;
      min-height: 0;
      width: 100% !important;
      height: 100% !important;
    }
    .db-card .x-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 0;
    }
    .db-card .x-scroll canvas {
      height: 100% !important;
      width: auto !important;
      flex: none;
    }
    .db-card .heat-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .heatmap-table      { border-collapse: collapse; }
    .heatmap-table th   { padding: 1px 2px; font-size: 7px; color: var(--muted); font-weight: 500; white-space: nowrap; }
    .heatmap-table td   { width: 15px; height: 12px; border-radius: 2px; text-align: center; font-size: 6px; }

    /* ════════════════════════════════════════════════════ */
    /* 手機版直式優化 (max-width: 768px) */
    /* ════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      /* 1. 解除外層所有 overflow: hidden，允許滾動 */
      html, body, .main-content, .page-body {
        overflow: visible !important;
        overflow-y: auto !important;
        height: auto;
        min-height: 100%;
      }

      /* 2. 讓 .page-body 變成區塊容器，不再使用 flex 限制 */
      .page-body {
        display: block;
        height: auto;
        padding: 0 0 20px 0;  /* 底部留白 */
      }

      /* 3. 所有內部區塊改為高度自動，不再強制 20%/40%/40% */
      #row-cards, #row-mid, #row-bot {
        height: auto;
        overflow: visible;
      }

      /* 4. 統計卡片改為 2 列，自動換行 */
      #row-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px 10px 5px;
      }

      /* 5. 中間與下方區塊改為單列，卡片垂直排列 */
      #row-mid, #row-bot {
        display: block;        /* 改為 block，每個卡片獨立一行 */
        padding: 10px 10px;
      }

      /* 每個卡片之間增加間距 */
      #row-mid .db-card,
      #row-bot .db-card {
        margin-bottom: 15px;
        min-height: 280px;      /* 確保圖表可視高度足夠 */
      }

      /* 最後一個卡片底部不留多餘 margin */
      #row-bot .db-card:last-child {
        margin-bottom: 0;
      }

      /* 統計卡片內部字體微調 */
      .stat-card .value {
        font-size: 18px;
      }
      .stat-card .sub-label {
        font-size: 10px;
      }

      /* 熱力圖允許橫向滾動 */
      .heat-wrap {
        overflow-x: auto;
      }
      .heatmap-table td {
        width: 12px;
        height: 10px;
        font-size: 5px;
      }
    }
  </style>
</head>
<body>
<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>
<script>
/* ── Chart.js 全域設定 ── */
Chart.defaults.font.size   = 9;
Chart.defaults.font.family = "'Noto Sans TC','Microsoft JhengHei',sans-serif";
Chart.defaults.plugins.legend.labels.boxWidth = 8;
Chart.defaults.plugins.legend.labels.padding  = 5;

let G = { devices:[], stateMap:{}, inventoryMap:{}, orders:[], sales:[] };
let charts = {};

window.addEventListener("DOMContentLoaded", async () => {
  renderLayout("Dashboard", "dashboard");
  document.getElementById("page-body").innerHTML = buildSkeleton();
  await loadAll();
});

function getAuthorizedDevices(allCodes) {
  const allowed = getSession().devices;
  if (!allowed || allowed.length === 0) return allCodes;
  return allCodes.filter(c => allowed.includes(c));
}

async function loadAll() {
  showLoading(true);
  try {
    const { company } = getSession();
    const begin = getMonthStart(), end = getToday();

    const stateRes = await callAPI("/MachineState.aspx", { company });
    const allCodes = stateRes.machine.map(m => m.code);
    G.devices = getAuthorizedDevices(allCodes);
    stateRes.machine.forEach(m => G.stateMap[m.code] = m);

    await Promise.all(G.devices.map(async code => {
      try {
        const r = await callAPI("/OrderMachineCommodity.aspx", { code, company });
        if (!G.inventoryMap[code]) G.inventoryMap[code] = {};
        G.inventoryMap[code].sellable = r.commodity || [];
      } catch { G.inventoryMap[code] = { sellable: [] }; }
    }));

    const orderRes = await callAPI("/OrderList.aspx", { begin, company, end, future: 1 });
    G.orders = orderRes.order || [];
    const salesRes = await callAPI("/Sales.aspx", { begin, company, end });
    const allSales = salesRes.sales || [];
    const hasFilter = Array.isArray(G.devices) && G.devices.length > 0;
    G.sales = hasFilter ? allSales.filter(s => G.devices.includes(s.code)) : allSales;

    renderDashboard();
  } catch(e) {
    document.getElementById("page-body").innerHTML = `<p style="color:red;padding:24px;">資料載入失敗：${e.message}</p>`;
  } finally { showLoading(false); }
}

function buildSkeleton() {
  return `
    <div id="row-cards">
      ${["設備狀態","庫存狀態","本月交易","今日交易"].map(l=>
        `<div class="stat-card"><div class="label">${l}</div><div class="value">…</div></div>`
      ).join("")}
    </div>
    <div id="row-mid">
      <div class="db-card"><h3>設備連線狀態</h3><canvas id="chart-conn"></canvas></div>
      <div class="db-card"><h3>各設備商品販售統計</h3><div class="x-scroll"><canvas id="chart-device-sales"></canvas></div></div>
      <div class="db-card"><h3>每日交易趨勢（筆數、金額）</h3><canvas id="chart-trend"></canvas></div>
    </div>
    <div id="row-bot">
      <div class="db-card"><h3>庫存狀態</h3><canvas id="chart-inv"></canvas></div>
      <div class="db-card"><h3>商品銷售排名</h3><canvas id="chart-rank"></canvas></div>
      <div class="db-card"><h3>銷售熱力圖（週×時段）</h3><div class="heat-wrap" id="heatmap-wrap"></div></div>
    </div>`;
}

function renderDashboard() {
  const now = new Date(), today = getToday();
  let online=0, offline=0;
  G.devices.forEach(code => {
    const m = G.stateMap[code];
    (!m || (now - new Date(m.uploadTime))/60000 > 5) ? offline++ : online++;
  });

  let invFull=0, invNormal=0, invLow=0, invShort=0;
  G.devices.forEach(code => {
    const inv = G.inventoryMap[code]?.sellable || [];
    const total = inv.length;
    if (!total) { invShort++; return; }
    const pct = inv.filter(i => i.quantity >= 1).length / total;
    if (pct >= 0.8) invFull++;
    else if (pct >= 0.5) invNormal++;
    else if (pct >= 0.25) invLow++;
    else invShort++;
  });

  const monthSales = G.sales.filter(s => s.state === 1);
  const monthAmt = monthSales.reduce((a,s) => a+(s.price||0), 0);
  const todaySales = monthSales.filter(s => s.time?.startsWith(today));
  const todayAmt = todaySales.reduce((a,s) => a+(s.price||0), 0);

  document.getElementById("row-cards").innerHTML = `
    <div class="stat-card" onclick="location.href='device.html'">
      <div class="icon">🖥️</div>
      <div class="label">設備狀態</div>
      <div class="value">${G.devices.length}</div>
      <div class="sub-label">連線 ${online} ／ 離線 ${offline}</div>
    </div>
    <div class="stat-card" onclick="location.href='inventory.html'">
      <div class="icon">📦</div>
      <div class="label">庫存狀態</div>
      <div class="value">${G.devices.length}</div>
      <div class="sub-label">充足${invFull} 正常${invNormal} 稍低${invLow} 不足${invShort}</div>
    </div>
    <div class="stat-card" onclick="location.href='transaction_month.html'">
      <div class="icon">💳</div>
      <div class="label">本月交易</div>
      <div class="value">${monthSales.length}</div>
      <div class="sub-label">NT$ ${monthAmt.toLocaleString()}</div>
    </div>
    <div class="stat-card" onclick="location.href='transaction_today.html'">
      <div class="icon">📅</div>
      <div class="label">今日交易</div>
      <div class="value">${todaySales.length}</div>
      <div class="sub-label">NT$ ${todayAmt.toLocaleString()}</div>
    </div>`;

  drawConnectionPie(online, offline);
  drawInventoryPie(invFull, invNormal, invLow, invShort);
  drawDeviceSales(monthSales);
  drawRankBar(monthSales);
  drawTrend(monthSales);
  drawHeatmap(monthSales);
}

function drawConnectionPie(on, off) {
  charts.conn?.destroy();
  charts.conn = new Chart(document.getElementById("chart-conn"), {
    type:"doughnut",
    data:{ labels:["連線","離線"], datasets:[{ data:[on,off], backgroundColor:["#16a34a","#dc2626"] }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"bottom", labels:{ font:{size:8}, boxWidth:7, padding:4 } } }, cutout:"62%" }
  });
}

function drawInventoryPie(f,n,l,s) {
  charts.inv?.destroy();
  charts.inv = new Chart(document.getElementById("chart-inv"), {
    type:"doughnut",
    data:{ labels:["充足","正常","稍低","不足"], datasets:[{ data:[f,n,l,s], backgroundColor:["#16a34a","#2563eb","#d97706","#dc2626"] }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"bottom", labels:{ font:{size:8}, boxWidth:7, padding:4 } } }, cutout:"62%" }
  });
}

function drawDeviceSales(sales) {
  const map={}, productSet=new Set();
  sales.forEach(s => {
    const dev=s.name||s.code, prod=s.commodityName;
    if(!map[dev]) map[dev]={};
    map[dev][prod]=(map[dev][prod]||0)+1;
    productSet.add(prod);
  });
  const devices=Object.keys(map), products=[...productSet];
  const colors=["#2563eb","#16a34a","#d97706","#dc2626","#7c3aed","#0891b2","#be185d","#65a30d"];
  const dsCanvas = document.getElementById("chart-device-sales");
  const dsWrap = dsCanvas.parentElement;
  dsCanvas.style.width  = Math.max(devices.length * 56, dsWrap.clientWidth || 200) + "px";
  dsCanvas.style.height = '';   // 清除內聯高度

  charts.deviceSales?.destroy();
  charts.deviceSales = new Chart(dsCanvas, {
    type:"bar",
    data:{ labels:devices, datasets:products.map((p,i)=>({
      label:p, data:devices.map(d=>map[d][p]||0), backgroundColor:colors[i%colors.length]
    })) },
    options:{ responsive:false, plugins:{ legend:{ display:false } }, scales:{ x:{ stacked:true, ticks:{ font:{size:8} } }, y:{ stacked:true, beginAtZero:true, ticks:{ font:{size:8} } } } }
  });
}

function drawRankBar(sales) {
  const map={};
  sales.forEach(s=>{ map[s.commodityName]=(map[s.commodityName]||0)+1; });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  charts.rank?.destroy();
  charts.rank = new Chart(document.getElementById("chart-rank"), {
    type:"bar",
    data:{ labels:sorted.map(x=>x[0]), datasets:[{ label:"銷售數量", data:sorted.map(x=>x[1]), backgroundColor:"#2563eb" }] },
    options:{ responsive:true, maintainAspectRatio:false, indexAxis:"y", plugins:{ legend:{ display:false } }, scales:{ x:{ beginAtZero:true, ticks:{ font:{size:8} } }, y:{ ticks:{ font:{size:8} } } } }
  });
}

function drawTrend(sales) {
  const dayMap={}, amtMap={};
  sales.forEach(s => {
    const d=s.time?.slice(0,10); if(!d) return;
    dayMap[d]=(dayMap[d]||0)+1;
    amtMap[d]=(amtMap[d]||0)+(s.price||0);
  });
  const days=Object.keys(dayMap).sort();
  charts.trend?.destroy();
  charts.trend = new Chart(document.getElementById("chart-trend"), {
    type:"line",
    data:{ labels:days.map(d=>d.slice(5)), datasets:[
      { label:"筆數", data:days.map(d=>dayMap[d]), borderColor:"#2563eb", tension:0.4, pointRadius:1, yAxisID:"y1" },
      { label:"金額", data:days.map(d=>amtMap[d]), borderColor:"#16a34a", tension:0.4, pointRadius:1, yAxisID:"y2" }
    ] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"bottom", labels:{ font:{size:8}, boxWidth:7, padding:4 } } }, scales:{ x:{ ticks:{ font:{size:8}, maxTicksLimit:10 } }, y1:{ position:"left", beginAtZero:true, ticks:{ font:{size:8} } }, y2:{ position:"right", beginAtZero:true, ticks:{ font:{size:8} }, grid:{ drawOnChartArea:false } } } }
  });
}

function drawHeatmap(sales) {
  const days=["一","二","三","四","五","六","日"], hours=Array.from({length:24},(_,i)=>i);
  const grid=Array.from({length:7},()=>Array(24).fill(0));
  sales.forEach(s => {
    if(!s.time) return;
    const d=new Date(s.time.replace(" ","T"));
    grid[(d.getDay()+6)%7][d.getHours()]++;
  });
  const max=Math.max(...grid.flat(),1);
  const getColor=v=>`rgba(37,99,235,${(v/max*0.85+0.05).toFixed(2)})`;

  let html=`<table class="heatmap-table"><tr><th></th>${hours.map(h=>`<th>${h}</th>`).join("")}</tr>`;
  days.forEach((day,di) => {
    html+=`<tr><th>週${day}</th>`;
    hours.forEach(h => {
      const v=grid[di][h];
      html+=`<td style="background:${getColor(v)};color:${v>max*0.5?"#fff":"transparent"}" title="週${day} ${h}時：${v}筆">${v||""}</td>`;
    });
    html+="</tr>";
  });
  html+="</table>";
  document.getElementById("heatmap-wrap").innerHTML=html;
}
</script>
</body>
</html>
