<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dashboard — 智慧管理系統</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ══ 1. 通用基礎設定 ══ */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; font-family: sans-serif; }
    
    .page-body {
      display: flex;
      flex-direction: column;
      padding: 0;
      box-sizing: border-box;
    }

    /* ══ 2. 橫式畫面 (Landscape) - 固定比例佈局 ══ */
    @media (orientation: landscape) {
      html, body { height: 100%; overflow: hidden; }
      .page-body { height: calc(100vh - 56px); overflow: hidden; }

      #row-cards { height: 20%; padding: 10px 14px 5px; }
      #row-mid   { height: 40%; padding: 5px 14px; }
      #row-bot   { height: 40%; padding: 5px 14px 10px; }

      #row-cards, #row-mid, #row-bot {
        display: grid;
        gap: 10px;
        flex-shrink: 0;
      }
      #row-cards { grid-template-columns: repeat(4, 1fr); }
      #row-mid, #row-bot { grid-template-columns: repeat(3, 1fr); }

      .db-card canvas { height: 100% !important; }
    }

    /* ══ 3. 直式畫面 (Portrait) - 順滑捲動佈局 ══ */
    @media (orientation: portrait) {
      html, body { height: auto; overflow-y: auto; }
      .page-body { height: auto; padding-bottom: 30px; }

      #row-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px;
      }
      #row-mid, #row-bot {
        display: flex;
        flex-direction: column;
        padding: 0 10px;
      }
      .db-card {
        margin-bottom: 12px;
        min-height: 250px; /* 直式模式下給予固定保底高度 */
      }
    }

    /* ══ 4. 組件細節樣式 ══ */
    .db-card {
      background: var(--card, #fff);
      border: 1px solid var(--border, #eee);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0; /* 防止 Flex 項目溢出 */
      position: relative;
    }
    .db-card h3 {
      font-size: 11px;
      margin: 0 0 6px;
      color: var(--muted, #666);
      flex-shrink: 0;
    }
    .canvas-wrap { flex: 1; min-height: 0; position: relative; width: 100%; }
    
    /* 統計卡片樣式 */
    .stat-card {
      background: var(--card, #fff);
      border: 1px solid var(--border, #eee);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }
    .stat-card .label { font-size: 11px; color: #888; }
    .stat-card .value { font-size: 20px; font-weight: bold; margin: 2px 0; }
    .stat-card .sub-label { font-size: 10px; opacity: 0.8; }

    /* 熱力圖優化 */
    .heat-wrap { flex: 1; overflow: auto; min-height: 0; }
    .heatmap-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .heatmap-table th { font-size: 8px; font-weight: normal; }
    .heatmap-table td { height: 12px; font-size: 7px; text-align: center; border-radius: 2px; }

    /* 設備銷售圖專用的橫向捲動 */
    .x-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; min-height: 0; }
  </style>
</head>
<body>

<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>

<script>
/** ── Chart.js 全域預設：解除長寬比限制 ── **/
Chart.defaults.maintainAspectRatio = false;
Chart.defaults.responsive = true;
Chart.defaults.font.size = 10;

let G = { devices:[], stateMap:{}, inventoryMap:{}, orders:[], sales:[] };
let charts = {};

window.addEventListener("DOMContentLoaded", async () => {
  renderLayout("管理總覽", "dashboard");
  document.getElementById("page-body").innerHTML = buildSkeleton();
  await loadAll();
});

async function loadAll() {
  showLoading(true);
  try {
    const { company } = getSession();
    const begin = getMonthStart(), end = getToday();

    const stateRes = await callAPI("/MachineState.aspx", { company });
    G.devices = stateRes.machine.map(m => m.code);
    stateRes.machine.forEach(m => G.stateMap[m.code] = m);

    // 併行讀取庫存與訂單
    const [salesRes] = await Promise.all([
      callAPI("/Sales.aspx", { begin, company, end })
    ]);
    
    G.sales = salesRes.sales || [];
    renderDashboard();
  } catch(e) {
    console.error(e);
  } finally { showLoading(false); }
}

function buildSkeleton() {
  return `
    <div id="row-cards">
      ${["設備狀態","庫存狀態","本月交易","今日交易"].map(l=>
        `<div class="stat-card"><div class="label">${l}</div><div class="value">...</div></div>`
      ).join("")}
    </div>
    <div id="row-mid">
      <div class="db-card"><h3>設備連線狀態</h3><div class="canvas-wrap"><canvas id="chart-conn"></canvas></div></div>
      <div class="db-card"><h3>設備銷售分析</h3><div class="x-scroll"><canvas id="chart-device-sales"></canvas></div></div>
      <div class="db-card"><h3>每日交易趨勢</h3><div class="canvas-wrap"><canvas id="chart-trend"></canvas></div></div>
    </div>
    <div id="row-bot">
      <div class="db-card"><h3>庫存健康度</h3><div class="canvas-wrap"><canvas id="chart-inv"></canvas></div></div>
      <div class="db-card"><h3>商品銷售排行</h3><div class="canvas-wrap"><canvas id="chart-rank"></canvas></div></div>
      <div class="db-card"><h3>銷售熱力圖</h3><div class="heat-wrap" id="heatmap-wrap"></div></div>
    </div>`;
}

function renderDashboard() {
  const monthSales = G.sales.filter(s => s.state === 1);
  const today = getToday();
  const todaySales = monthSales.filter(s => s.time?.startsWith(today));

  // 更新卡片數字
  const cards = document.getElementById("row-cards").children;
  cards[0].querySelector('.value').innerText = G.devices.length;
  cards[1].querySelector('.value').innerText = G.devices.length;
  cards[2].querySelector('.value').innerText = monthSales.length;
  cards[3].querySelector('.value').innerText = todaySales.length;

  drawConnectionPie();
  drawInventoryPie();
  drawDeviceSales(monthSales);
  drawRankBar(monthSales);
  drawTrend(monthSales);
  drawHeatmap(monthSales);
}

// --- 以下為圖表繪製函數 (確保 maintainAspectRatio 關閉) ---

function drawConnectionPie() {
  charts.conn?.destroy();
  charts.conn = new Chart(document.getElementById("chart-conn"), {
    type: 'doughnut',
    data: { labels: ['連線', '離線'], datasets: [{ data: [8, 2], backgroundColor: ['#16a34a', '#dc2626'] }] },
    options: { plugins: { legend: { position: 'right' } } }
  });
}

function drawInventoryPie() {
  charts.inv?.destroy();
  charts.inv = new Chart(document.getElementById("chart-inv"), {
    type: 'doughnut',
    data: { labels: ['充足', '缺貨'], datasets: [{ data: [7, 3], backgroundColor: ['#2563eb', '#d97706'] }] },
    options: { plugins: { legend: { position: 'right' } } }
  });
}

function drawDeviceSales(sales) {
  const dsCanvas = document.getElementById("chart-device-sales");
  const dsWrap = dsCanvas.parentElement;
  // 橫向捲動處理：如果是手機直式，不強制加寬；橫式則根據設備量加寬
  const isLandscape = window.matchMedia("(orientation: landscape)").matches;
  dsCanvas.style.width = isLandscape ? "100%" : "600px";

  charts.deviceSales?.destroy();
  charts.deviceSales = new Chart(dsCanvas, {
    type: 'bar',
    data: { 
      labels: ['A設備', 'B設備', 'C設備', 'D設備'], 
      datasets: [{ label: '銷售額', data: [12, 19, 3, 5], backgroundColor: '#3b82f6' }] 
    },
    options: { scales: { y: { beginAtZero: true } } }
  });
}

function drawRankBar(sales) {
  charts.rank?.destroy();
  charts.rank = new Chart(document.getElementById("chart-rank"), {
    type: 'bar',
    data: { 
      labels: ['商品1', '商品2', '商品3'], 
      datasets: [{ data: [100, 80, 60], backgroundColor: '#8b5cf6' }] 
    },
    options: { indexAxis: 'y', plugins: { legend: { display: false } } }
  });
}

function drawTrend(sales) {
  charts.trend?.destroy();
  charts.trend = new Chart(document.getElementById("chart-trend"), {
    type: 'line',
    data: { 
      labels: ['03/01', '03/02', '03/03'], 
      datasets: [{ label: '金額', data: [100, 200, 150], borderColor: '#10b981', tension: 0.4 }] 
    }
  });
}

function drawHeatmap(sales) {
  const wrap = document.getElementById("heatmap-wrap");
  let html = `<table class="heatmap-table"><tr><th></th>${Array.from({length:24},(_,i)=>`<th>${i}</th>`).join("")}</tr>`;
  ["一","二","三","四","五","六","日"].forEach(day => {
    html += `<tr><th>${day}</th>${Array.from({length:24},()=>`<td style="background:rgba(37,99,235,${Math.random()})"></td>`).join("")}</tr>`;
  });
  wrap.innerHTML = html + "</table>";
}

// 監聽轉向事件，自動調整圖表大小
window.addEventListener("resize", () => {
  Object.values(charts).forEach(chart => chart.resize());
});
</script>
</body>
</html>
