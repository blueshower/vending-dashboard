<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — 販賣機管理</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .chart-canvas-wrap {
      position: relative;
      height: 240px;
      width: 100%;
    }
    .chart-canvas-wrap canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
    }
    .chart-canvas-wrap.heatmap-wrap {
      overflow-x: auto;
      overflow-y: auto;
    }
    .heatmap-table {
      border-collapse: collapse;
      height: 100%;
      table-layout: fixed;
    }
    .heatmap-table th,
    .heatmap-table td {
      min-width: 22px;
      width: 22px;
      height: 26px;
      font-size: 10px;
      text-align: center;
      padding: 0;
      white-space: nowrap;
    }
    .heatmap-table th {
      font-weight: 600;
      background: transparent;
      color: inherit;
      position: sticky;
      left: 0;
      z-index: 1;
    }
    .heatmap-table tr th:first-child {
      min-width: 32px;
      width: 32px;
    }

    /* ── 快取狀態列 ── */
    .cache-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #166534;
      flex-wrap: wrap;
    }
    .cache-bar.stale {
      background: #fefce8;
      border-color: #fde68a;
      color: #92400e;
    }
    .cache-bar .cache-time {
      font-weight: 600;
    }
    .cache-bar .btn-refresh {
      margin-left: auto;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: background .15s;
    }
    .cache-bar .btn-refresh:hover { background: #15803d; }
    .cache-bar.stale .btn-refresh { background: #d97706; }
    .cache-bar.stale .btn-refresh:hover { background: #b45309; }

    /* 寫入進度提示 */
    .sync-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    .sync-toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let G = { devices:[], stateMap:{}, inventoryMap:{}, orders:[], sales:[], updatedAt: null };
let charts = {};

window.addEventListener("DOMContentLoaded", async () => {
  renderLayout("Dashboard", "dashboard");
  document.getElementById("page-body").innerHTML = buildSkeleton();
  await loadAll();
});

function getAuthorizedDevices(allCodes) {
  const allowed = getSession().devices;
  if (!allowed || allowed.length === 0) return allCodes;
  return allCodes.filter(c => allowed.includes(c));
}

// 將日期區間拆分成以 maxDays 為一段的區間陣列 (不重疊)
function splitDateRange(startStr, endStr, maxDays = 6) {
  const ranges = [];
  let currentStart = new Date(startStr + "T00:00:00");
  const endDate = new Date(endStr + "T00:00:00");

  while (currentStart <= endDate) {
    let currentEnd = new Date(currentStart);
    currentEnd.setDate(currentEnd.getDate() + maxDays - 1);
    if (currentEnd > endDate) currentEnd = new Date(endDate);

    const begin = currentStart.toISOString().slice(0, 10);
    const end = currentEnd.toISOString().slice(0, 10);
    ranges.push({ begin, end });

    // 下一段從 currentEnd 的隔天開始
    currentStart.setDate(currentEnd.getDate() + 1);
  }
  return ranges;
}

// ── 主要載入（呼叫 API，然後寫回 Sheet）──
async function loadAll() {
  showLoading(true);
  showSyncToast("🔄 正在從 API 載入資料…");
  try {
    const { company } = getSession();
    const begin = getMonthStart(), end = getToday();

    const stateRes = await callAPI("/MachineState.aspx", { company });
    const allCodes = stateRes.machine.map(m => m.code);
    G.devices = getAuthorizedDevices(allCodes);
    stateRes.machine.forEach(m => G.stateMap[m.code] = m);

    // 設備名稱
    const nameRes = await callAPI("/Machine.aspx", { company });
    const nameMap = {};
    (nameRes.machine || []).forEach(m => { nameMap[m.code] = m.name; });

    await Promise.all(G.devices.map(async code => {
      try {
        const [rtRes, slRes] = await Promise.allSettled([
          callAPI("/MachineCommodity.aspx", { code, company }),
          callAPI("/OrderMachineCommodity.aspx", { code, company }),
        ]);
        G.inventoryMap[code] = {
          name: nameMap[code] || code,
          realtime: rtRes.status==="fulfilled" ? (rtRes.value.commodity||[]) : [],
          sellable:  slRes.status==="fulfilled" ? (slRes.value.commodity||[]) : [],
        };
      } catch { G.inventoryMap[code] = { name: nameMap[code]||code, realtime:[], sellable:[] }; }
    }));

    const orderRes = await callAPI("/OrderList.aspx", { begin, company, end, future: 1 });
    G.orders = orderRes.order || [];

    // ----- 銷售資料：分段平行呼叫 (每段最多 6 天) -----
    const salesChunks = splitDateRange(begin, end, 6);
    const chunkPromises = salesChunks.map(chunk =>
      callAPI("/Sales.aspx", { begin: chunk.begin, end: chunk.end, company })
    );
    const chunkResults = await Promise.allSettled(chunkPromises);
    const allSalesRaw = [];
    let anyFailed = false;
    for (const result of chunkResults) {
      if (result.status === 'fulfilled' && result.value && Array.isArray(result.value.sales)) {
        allSalesRaw.push(...result.value.sales);
      } else {
        anyFailed = true;
        console.warn('分段銷售數據請求失敗:', result.reason);
      }
    }
    if (allSalesRaw.length === 0 && anyFailed) {
      throw new Error('無法取得銷售數據，所有分段請求皆失敗');
    }
    if (anyFailed) {
      showSyncToast('⚠️ 部分銷售資料取得失敗，圖表可能不完整');
    }
    const hasFilter = Array.isArray(G.devices) && G.devices.length > 0;
    G.sales = hasFilter ? allSalesRaw.filter(s => G.devices.includes(s.code)) : allSalesRaw;
    // ------------------------------------------------

    G.updatedAt = new Date().toISOString();

    // ── 渲染 Dashboard ──
    renderDashboard();

    // ── 非同步寫回 Google Sheet（不阻塞 UI）──
    syncToSheet();

  } catch(e) {
    document.getElementById("page-body").innerHTML = `<p style="color:red;padding:24px;">資料載入失敗：${e.message}</p>`;
  } finally { showLoading(false); }
}

// ── 將所有資料分批寫回 Google Sheet ──
async function syncToSheet() {
  showSyncToast("☁️ 正在同步資料到 Google Sheet…");
  try {
    const { company } = getSession();
    const now = new Date();

    // 1. 設備狀態快取
    const devicesPayload = G.devices.map(code => {
      const m = G.stateMap[code] || {};
      const inv = G.inventoryMap[code] || {};
      const diff = (now - new Date(m.uploadTime)) / 60000;
      return {
        code,
        name: inv.name || "—",
        online: diff <= 5,
        uploadTime: m.uploadTime || "",
        temperature1: m.temperature1 ?? "",
      };
    });
    await writeCacheToSheet("cache_devices", {
      company, updatedAt: G.updatedAt, devices: devicesPayload
    });

    // 2. 庫存快取
    const inventoryPayload = [];
    G.devices.forEach(code => {
      const { name, realtime, sellable } = G.inventoryMap[code] || {};
      const rtMap = {};
      (realtime||[]).forEach(item => {
        if (!rtMap[item.commodityCode]) rtMap[item.commodityCode] = { name: item.name, count: 0 };
        rtMap[item.commodityCode].count++;
      });
      const slMap = {};
      (sellable||[]).forEach(item => { slMap[item.commodityCode] = item.quantity; });
      const allCodes = new Set([...Object.keys(rtMap), ...Object.keys(slMap)]);
      allCodes.forEach(cc => {
        inventoryPayload.push({
          code,
          devName: name || "—",
          commodityCode: cc,
          commodityName: rtMap[cc]?.name || (sellable||[]).find(s => s.commodityCode===cc)?.commodityName || cc,
          realtime: rtMap[cc]?.count ?? "",
          sellable: slMap[cc] ?? 0,
        });
      });
    });
    // 訂單快取（今日預訂）
    await writeCacheToSheet("cache_inventory", {
      company, updatedAt: G.updatedAt,
      inventory: inventoryPayload,
      orders: G.orders,
    });

    // 3. 本月銷售快取
    await writeCacheToSheet("cache_sales_month", {
      company, updatedAt: G.updatedAt, sales: G.sales
    });

    // 4. 今日銷售快取
    const today = getToday();
    const todaySales = G.sales.filter(s => s.time?.startsWith(today));
    await writeCacheToSheet("cache_sales_today", {
      company, updatedAt: G.updatedAt, sales: todaySales
    });

    showSyncToast("✅ 資料同步完成！其他頁面可直接讀取快取");
  } catch(e) {
    showSyncToast("⚠️ 部分資料同步失敗，請檢查 GAS 設定");
    console.error("[syncToSheet]", e);
  }
}

// ── Toast 提示 ──
let _toastTimer = null;
function showSyncToast(msg, duration=3500) {
  let toast = document.getElementById("sync-toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "sync-toast";
    toast.className = "sync-toast";
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add("show");
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toast.classList.remove("show"), duration);
}

function buildSkeleton() {
  return `<div class="stats-grid" id="stats-grid">${
    ["設備狀態","庫存狀態","本月交易","今日交易"].map(l=>
      `<div class="stat-card"><div class="label">${l}</div><div class="value">…</div></div>`
    ).join("")
  }</div><div class="charts-grid" id="charts-grid"></div>`;
}

function renderDashboard() {
  const now = new Date(), today = getToday();
  let online=0, offline=0;
  G.devices.forEach(code => {
    const m = G.stateMap[code];
    (!m || (now - new Date(m.uploadTime))/60000 > 5) ? offline++ : online++;
  });

  let invFull=0, invNormal=0, invLow=0, invShort=0;
  G.devices.forEach(code => {
    const inv = G.inventoryMap[code]?.sellable || [];
    const total = inv.length;
    if (!total) { invShort++; return; }
    const pct = inv.filter(i => i.quantity >= 1).length / total;
    if (pct >= 0.8) invFull++;
    else if (pct >= 0.5) invNormal++;
    else if (pct >= 0.25) invLow++;
    else invShort++;
  });

  const monthSales = G.sales.filter(s => s.state === 1);
  const monthAmt = monthSales.reduce((a,s) => a+(s.price||0), 0);
  const todaySales = monthSales.filter(s => s.time?.startsWith(today));
  const todayAmt = todaySales.reduce((a,s) => a+(s.price||0), 0);

  const updatedLabel = G.updatedAt
    ? new Date(G.updatedAt).toLocaleString("zh-TW", { hour12:false })
    : "—";

  document.getElementById("stats-grid").innerHTML = `
    <div class="stat-card" onclick="location.href='device.html'">
      <div class="icon">🖥️</div>
      <div class="label">設備狀態</div>
      <div class="value">${G.devices.length}</div>
      <div class="sub-label">連線 ${online} ／ 離線 ${offline}</div>
    </div>
    <div class="stat-card" onclick="location.href='inventory.html'">
      <div class="icon">📦</div>
      <div class="label">庫存狀態</div>
      <div class="value">${G.devices.length}</div>
      <div class="sub-label">充足${invFull} 正常${invNormal} 稍低${invLow} 不足${invShort}</div>
    </div>
    <div class="stat-card" onclick="location.href='transaction_month.html'">
      <div class="icon">💳</div>
      <div class="label">本月交易</div>
      <div class="value">${monthSales.length}</div>
      <div class="sub-label">NT$ ${monthAmt.toLocaleString()}</div>
    </div>
    <div class="stat-card" onclick="location.href='transaction_today.html'">
      <div class="icon">📅</div>
      <div class="label">今日交易</div>
      <div class="value">${todaySales.length}</div>
      <div class="sub-label">NT$ ${todayAmt.toLocaleString()}</div>
    </div>`;

  document.getElementById("charts-grid").innerHTML = `
    <!-- 快取狀態列 -->
    <div class="cache-bar" id="cache-status-bar" style="grid-column:1/-1">
      <span>📡 資料來源：即時 API</span>
      <span class="cache-time">最後更新：${updatedLabel}</span>
      <button class="btn-refresh" onclick="loadAll()">🔄 重新整理</button>
    </div>

    <div class="chart-col">
      <div class="chart-card"><h3>連線狀態</h3><div class="chart-canvas-wrap"><canvas id="chart-conn"></canvas></div></div>
      <div class="chart-card"><h3>庫存狀態</h3><div class="chart-canvas-wrap"><canvas id="chart-inv"></canvas></div></div>
    </div>
    <div class="chart-col">
      <div class="chart-card"><h3>各設備商品販售統計</h3><div class="chart-canvas-wrap" style="overflow-x:auto"><canvas id="chart-device-sales"></canvas></div></div>
      <div class="chart-card"><h3>商品銷售排名</h3><div class="chart-canvas-wrap"><canvas id="chart-rank"></canvas></div></div>
    </div>
    <div class="chart-col">
      <div class="chart-card"><h3>每日交易趨勢</h3><div class="chart-canvas-wrap"><canvas id="chart-trend"></canvas></div></div>
      <div class="chart-card"><h3>銷售熱力圖（週×時段）</h3><div class="chart-canvas-wrap heatmap-wrap" id="heatmap-wrap"></div></div>
    </div>`;

  drawConnectionPie(online, offline);
  drawInventoryPie(invFull, invNormal, invLow, invShort);
  drawDeviceSales(monthSales);
  drawRankBar(monthSales);
  drawTrend(monthSales);
  drawHeatmap(monthSales);
}

function drawConnectionPie(on, off) {
  charts.conn?.destroy();
  charts.conn = new Chart(document.getElementById("chart-conn"), {
    type:"doughnut",
    data:{ labels:["連線","離線"], datasets:[{ data:[on,off], backgroundColor:["#16a34a","#dc2626"] }] },
    options:{ maintainAspectRatio:false, plugins:{ legend:{ position:"bottom" } }, cutout:"60%" }
  });
}

function drawInventoryPie(f,n,l,s) {
  charts.inv?.destroy();
  charts.inv = new Chart(document.getElementById("chart-inv"), {
    type:"doughnut",
    data:{ labels:["充足","正常","稍低","不足"], datasets:[{ data:[f,n,l,s], backgroundColor:["#16a34a","#2563eb","#d97706","#dc2626"] }] },
    options:{ maintainAspectRatio:false, plugins:{ legend:{ position:"bottom" } }, cutout:"60%" }
  });
}

function drawDeviceSales(sales) {
  const map={}, productSet=new Set();
  sales.forEach(s => {
    const dev=s.name||s.code, prod=s.commodityName;
    if(!map[dev]) map[dev]={};
    map[dev][prod]=(map[dev][prod]||0)+1;
    productSet.add(prod);
  });
  const devices=Object.keys(map), products=[...productSet];
  const colors=["#2563eb","#16a34a","#d97706","#dc2626","#7c3aed","#0891b2","#be185d","#65a30d"];
  charts.deviceSales?.destroy();
  charts.deviceSales = new Chart(document.getElementById("chart-device-sales"), {
    type:"bar",
    data:{ labels:devices, datasets:products.map((p,i)=>({
      label:p, data:devices.map(d=>map[d][p]||0), backgroundColor:colors[i%colors.length]
    })) },
    options:{ maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{stacked:true}, y:{stacked:true,beginAtZero:true} } }
  });
}

function drawRankBar(sales) {
  const map={};
  sales.forEach(s=>{ map[s.commodityName]=(map[s.commodityName]||0)+1; });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  charts.rank?.destroy();
  charts.rank = new Chart(document.getElementById("chart-rank"), {
    type:"bar",
    data:{ labels:sorted.map(x=>x[0]), datasets:[{ label:"銷售數量", data:sorted.map(x=>x[1]), backgroundColor:"#2563eb" }] },
    options:{ maintainAspectRatio:false, indexAxis:"y", plugins:{ legend:{ display:false } }, scales:{ x:{ beginAtZero:true } } }
  });
}

function drawTrend(sales) {
  const dayMap={}, amtMap={};
  sales.forEach(s => {
    const d=s.time?.slice(0,10); if(!d) return;
    dayMap[d]=(dayMap[d]||0)+1;
    amtMap[d]=(amtMap[d]||0)+(s.price||0);
  });
  const days=Object.keys(dayMap).sort();
  charts.trend?.destroy();
  charts.trend = new Chart(document.getElementById("chart-trend"), {
    type:"line",
    data:{ labels:days.map(d=>d.slice(5)), datasets:[
      { label:"筆數", data:days.map(d=>dayMap[d]), borderColor:"#2563eb", tension:0.4, yAxisID:"y1" },
      { label:"金額", data:days.map(d=>amtMap[d]), borderColor:"#16a34a", tension:0.4, yAxisID:"y2" }
    ] },
    options:{ maintainAspectRatio:false, plugins:{ legend:{ position:"bottom" } }, scales:{
      y1:{ position:"left", beginAtZero:true },
      y2:{ position:"right", beginAtZero:true, grid:{ drawOnChartArea:false } }
    } }
  });
}

function drawHeatmap(sales) {
  const days=["一","二","三","四","五","六","日"], hours=Array.from({length:24},(_,i)=>i);
  const grid=Array.from({length:7},()=>Array(24).fill(0));
  sales.forEach(s => {
    if(!s.time) return;
    const d=new Date(s.time.replace(" ","T"));
    grid[(d.getDay()+6)%7][d.getHours()]++;
  });
  const max=Math.max(...grid.flat(),1);
  const getColor=v=>`rgba(37,99,235,${(v/max*0.85+0.05).toFixed(2)})`;

  let html=`<table class="heatmap-table" style="width:max-content;height:100%">`;
  html+=`<tr><th></th>${hours.map(h=>`<th>${h}</th>`).join("")}</tr>`;
  days.forEach((day,di) => {
    html+=`<tr><th>週${day}</th>`;
    hours.forEach(h => {
      const v=grid[di][h];
      html+=`<td style="background:${getColor(v)};color:${v>max*0.5?"#fff":"transparent"}" title="週${day} ${h}時：${v}筆">${v||""}</td>`;
    });
    html+="</tr>";
  });
  html+="</table>";
  document.getElementById("heatmap-wrap").innerHTML=html;
}
</script>
</body>
</html>
