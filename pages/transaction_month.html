<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本月交易明細 — 販賣機管理</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let charts = {};

window.addEventListener("DOMContentLoaded", async () => {
  renderLayout("本月交易明細", "transaction");
  document.getElementById("page-body").innerHTML = `<p style="padding:16px;color:#64748b">載入中…</p>`;
  await loadTransaction();
});

async function loadTransaction() {
  showLoading(true);
  try {
    const session = getSession();
    const { company } = session;
    // allowed：空陣列或無值 = 看全部；有值 = 只看指定設備
    const allowed = session.devices;
    const hasFilter = Array.isArray(allowed) && allowed.length > 0;

    const today = getToday();
    const begin = getMonthStart();

    const salesRes = await callAPI("/Sales.aspx", { begin, company, end: today });

    // Step1：只保留成功交易
    let sales = (salesRes.sales || []).filter(s => s.state === 1);

    // Step2：依設備權限過濾（有設定才過濾）
    if (hasFilter) {
      sales = sales.filter(s => allowed.includes(s.code));
    }

    renderTransaction(sales);
  } catch(e) {
    document.getElementById("page-body").innerHTML = `<p style="color:red;padding:24px">載入失敗：${e.message}</p>`;
  } finally { showLoading(false); }
}

function renderTransaction(sales) {
  const totalAmt = sales.reduce((a, s) => a + (s.price || 0), 0);
  const rows = sales.map((s, i) => `
    <tr>
      <td>${i+1}</td>
      <td>${s.time?.slice(0,16)||"—"}</td>
      <td><code style="font-size:11px">${s.code}</code></td>
      <td>${s.name||"—"}</td>
      <td>${s.commodityName||"—"}</td>
      <td>${s.layer||"—"}</td>
      <td>NT$ ${(s.price||0).toLocaleString()}</td>
      <td>${(s.detail||[]).map(d=>`${d.type} $${d.money}`).join("<br/>")}</td>
    </tr>`).join("");

  document.getElementById("page-body").innerHTML = `
    <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <span style="background:#dbeafe;color:#1e40af;padding:4px 14px;border-radius:99px;font-size:12px;font-weight:700">📅 本月</span>
      <button class="btn-icon" onclick="location.href='transaction_today.html'">📌 切換今日</button>
      <span style="color:#64748b;font-size:13px">共 ${sales.length} 筆 ／ 合計 NT$ ${totalAmt.toLocaleString()}</span>
    </div>
    <div class="detail-layout">
      <div class="table-wrap">
        <div class="table-header"><h2>本月交易列表</h2></div>
        <div style="overflow-y:auto;max-height:520px">
          <table>
            <thead><tr><th>#</th><th>時間</th><th>設備編號</th><th>設備名稱</th><th>商品</th><th>位置</th><th>金額</th><th>付款</th></tr></thead>
            <tbody>${rows||"<tr><td colspan='8' style='text-align:center;color:#64748b'>無資料</td></tr>"}</tbody>
          </table>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="chart-card"><h3>銷售週次分布</h3><canvas id="chart-week" height="160"></canvas></div>
        <div class="chart-card"><h3>銷售週別分布</h3><canvas id="chart-dow" height="160"></canvas></div>
        <div class="chart-card"><h3>銷售時段分布</h3><canvas id="chart-hour" height="160"></canvas></div>
        <div class="chart-card"><h3>商品金額落點分布</h3><canvas id="chart-price" height="160"></canvas></div>
      </div>
    </div>`;

  drawWeekly(sales); drawDOW(sales); drawHourly(sales); drawPriceDist(sales);
}

function drawWeekly(sales) {
  const map = {};
  sales.forEach(s => {
    if (!s.time) return;
    const key = `第${Math.ceil(new Date(s.time.replace(" ","T")).getDate()/7)}週`;
    map[key] = (map[key]||0)+1;
  });
  const labels = Object.keys(map).sort();
  charts.week?.destroy();
  charts.week = new Chart(document.getElementById("chart-week"), {
    type:"bar", data:{ labels, datasets:[{ label:"筆數", data:labels.map(k=>map[k]), backgroundColor:"#2563eb" }] },
    options:{ plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
  });
}

function drawDOW(sales) {
  const days=["週一","週二","週三","週四","週五","週六","週日"], cnt=Array(7).fill(0);
  sales.forEach(s => { if(s.time) cnt[(new Date(s.time.replace(" ","T")).getDay()+6)%7]++; });
  charts.dow?.destroy();
  charts.dow = new Chart(document.getElementById("chart-dow"), {
    type:"bar", data:{ labels:days, datasets:[{ label:"筆數", data:cnt, backgroundColor:"#16a34a" }] },
    options:{ plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
  });
}

function drawHourly(sales) {
  const cnt=Array(24).fill(0);
  sales.forEach(s => { if(s.time) cnt[new Date(s.time.replace(" ","T")).getHours()]++; });
  charts.hour?.destroy();
  charts.hour = new Chart(document.getElementById("chart-hour"), {
    type:"line", data:{ labels:Array.from({length:24},(_,i)=>`${i}時`),
    datasets:[{ label:"筆數", data:cnt, borderColor:"#d97706", tension:0.4, fill:true, backgroundColor:"rgba(217,119,6,.1)" }] },
    options:{ plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
  });
}

function drawPriceDist(sales) {
  const ranges=[[0,100,"$0-100"],[101,200,"$101-200"],[201,300,"$201-300"],[301,500,"$301-500"],[501,1000,"$501-1000"],[1001,9999,"$1001+"]];
  const cnt=ranges.map(([lo,hi])=>sales.filter(s=>(s.price||0)>=lo&&(s.price||0)<=hi).length);
  charts.price?.destroy();
  charts.price = new Chart(document.getElementById("chart-price"), {
    type:"bar", data:{ labels:ranges.map(r=>r[2]), datasets:[{ label:"筆數", data:cnt, backgroundColor:"#7c3aed" }] },
    options:{ plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
  });
}
</script>
</body>
</html>
