<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入 — 自動販賣機管理系統</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <h1>🏪 販賣機管理系統</h1>
    <p class="sub">請輸入登入資訊</p>
    <div class="form-group">
      <label for="inp-company">公司編號</label>
      <input id="inp-company" type="text" placeholder="例：2000116" />
    </div>
    <div class="form-group">
      <label for="inp-user">帳號</label>
      <input id="inp-user" type="text" placeholder="請輸入帳號" />
    </div>
    <div class="form-group">
      <label for="inp-pass">密碼</label>
      <input id="inp-pass" type="password" placeholder="請輸入密碼" />
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">登　入</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
</div>

<script src="js/config.js"></script>
<script>
// ============================================================
// 登入頁 JS — 透過 Google Sheet CSV 公開讀取驗證帳密
// ============================================================

async function doLogin() {
  const company = document.getElementById("inp-company").value.trim();
  const user    = document.getElementById("inp-user").value.trim();
  const pass    = document.getElementById("inp-pass").value.trim();
  const errEl   = document.getElementById("login-error");
  const btn     = document.getElementById("btn-login");

  errEl.textContent = "";
  if (!company || !user || !pass) { errEl.textContent = "請填寫所有欄位"; return; }

  btn.disabled = true;
  btn.textContent = "驗證中…";
  showLoading(true);

  try {
    // 讀取 Google Sheet 公開 CSV
    const csvUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=accounts`;
    const res  = await fetch(csvUrl);
    const text = await res.text();

    // 解析 CSV
    const rows = parseCSV(text);
    // rows[0] = 標題列, rows[1]~ = 資料

    let found = null;
    for (let i = 1; i < rows.length; i++) {
      const [col_company, col_user, col_pass, col_token, col_devices, col_username, col_active] = rows[i];
      if (
        col_company?.trim() === company &&
        col_user?.trim()    === user    &&
        col_pass?.trim()    === pass    &&
        col_active?.trim().toUpperCase() === "TRUE"
      ) {
        found = { col_token, col_devices, col_username };
        break;
      }
    }

    if (!found) {
      errEl.textContent = "公司編號、帳號或密碼錯誤";
      return;
    }

    const devices = found.col_devices
      ? found.col_devices.split(",").map(s => s.trim()).filter(Boolean)
      : [];

    saveSession({
      company,
      user,
      token:    found.col_token?.trim(),
      devices,
      username: found.col_username?.trim() || user,
    });

    window.location.href = "pages/dashboard.html";

  } catch(e) {
    errEl.textContent = "讀取失敗：" + e.message;
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = "登　入";
    showLoading(false);
  }
}

// 簡易 CSV 解析（處理引號包覆的欄位）
function parseCSV(text) {
  return text.trim().split("\n").map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ""; }
      else { cur += c; }
    }
    cols.push(cur);
    return cols;
  });
}

function showLoading(b) {
  document.getElementById("loading-overlay").classList.toggle("hidden", !b);
}

document.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
if (getSession()) window.location.href = "pages/dashboard.html";
</script>
</body>
</html>
